<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout | BC Cycling</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  <script src="js/supabase-config.js" defer></script>
  <script src="js/supabase-api.js" defer></script>
  <script src="js/chart.js" defer></script>
  <script src="js/workout_view.js" defer></script>
</head>
<body>
  <div class="sidebar">
    <img src="assets/logo/thunder-logo.png" alt="">
    <div class="items">
      <ul>
        <li><a href="index.html"><i class="fi fi-rr-apps"></i>Dashboard</a></li>
        <li class="menu-item">  
          <div class="menu-link" onclick="toggleDropdown(this)">
            <span><i class="fi fi-sr-bolt"></i>Treinos</span>
            <i class="fi fi-rr-angle-small-right arrow"></i>
          </div>

          <ul class="submenu">
            <li><a href="workout.html"><i class="fi fi-rc-wifi-1"></i>Listar treinos</a></li>
            <li><a href="create_workout.html"><i class="fi fi-rc-wifi-1"></i>Criar treino</a></li>
          </ul>
        </li>
        <li><a href="music_library.html"><i class="fi fi-sr-music"></i>Músicas</a></li>
      </ul>
    </div>
  </div>

  <main class="container">
    <h1 id="workoutTitle">Workout</h1>
    <p id="workoutMeta" class="status-message">Carregando treino...</p>
    <a id="playlistLink" class="hidden" target="_blank" rel="noopener noreferrer">Abrir playlist no Spotify</a>

    <div class="actions">
      <a href="index.html">Voltar</a>
      <a id="editWorkoutLink" href="edit_workout.html">Editar workout</a>
    </div>

    <section class="player-panel">
      <div class="player-stat zone">
        <span class="player-label">Zona</span>
        <strong id="currentZone">-</strong>
      </div>
      <div class="player-stat intensity">
        <span class="player-label">Intensidade</span>
        <strong id="currentIntensity">Aguardando</strong>
      </div>
      <div class="player-stat position">
        <span class="player-label">Posicao</span>
        <strong id="currentPosition">-</strong>
      </div>
      <div class="player-stat load">
        <span class="player-label">Carga</span>
        <strong id="currentLoad">-</strong>
      </div>
      <div class="player-stat time">
        <span class="player-label">Tempo</span>
        <strong id="currentElapsed">00:00</strong>
      </div>
    </section>

    <div class="chart-box">
      <canvas id="powerChart"></canvas>
    </div>

    <div class="player-controls">
      <button id="playButton" type="button"><i class="fi fi-sr-play"></i>Play</button>
      <button id="pauseButton" type="button"><i class="fi fi-sr-pause"></i>Pause</button>
      <button id="resetButton" type="button"><i class="fi fi-br-refresh"></i>Reiniciar</button>
      <span><i class="fi fi-ss-music-alt"></i><span id="playerMessage" class="status-message">Visualizacao do workout.</span></span>
    </div>

    <div id="spotifyEmbedWrap" class="spotify-embed-wrap hidden">
      <div id="spotifyEmbed" class="spotify-embed"></div>
    </div>
  </main>

  <script>
    function toggleDropdown(element) {
      const parent = element.parentElement;
      parent.classList.toggle("active");
    }
  </script>
</body>
</html>
